---
- name: Créer le dossier de déploiement
  file:
    path: /opt/todo-app
    state: directory
    mode: '0755'

- name: Copier le docker-compose.yml (source unique à la racine du projet)
  copy:
    src: "{{ playbook_dir }}/../../docker-compose.yml"
    dest: /opt/todo-app/docker-compose.yml
    mode: '0644'

- name: Copier le .env spécifique Back
  template:
    src: env.back.j2
    dest: /opt/todo-app/.env
    mode: '0600'

- name: Puller l'image backend
  command: docker compose pull backend
  args:
    chdir: /opt/todo-app

- name: Démarrer le conteneur backend
  command: docker compose up -d --no-deps backend
  args:
    chdir: /opt/todo-app