---
- name: Installer Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Démarrer et activer Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Installer Certbot et le plugin Nginx
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Copier la configuration Nginx du domaine
  template:
    src: todo-app.conf.j2
    dest: /etc/nginx/sites-available/todo-app.conf
    mode: '0644'
  notify: Reload nginx

- name: Activer le site (lien symbolique sites-enabled)
  file:
    src: /etc/nginx/sites-available/todo-app.conf
    dest: /etc/nginx/sites-enabled/todo-app.conf
    state: link
  notify: Reload nginx

- name: Désactiver le site par défaut
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Vérifier la configuration Nginx
  command: nginx -t
  register: nginx_test
  changed_when: false

- name: Afficher le résultat du test Nginx
  debug:
    var: nginx_test.stderr_lines

- name: Générer le certificat HTTPS avec Certbot
  command: >
    certbot --nginx
    -d {{ domain_name }}
    --non-interactive
    --agree-tos
    -m {{ admin_email }}
    --redirect
  register: certbot_result
  changed_when: "'Congratulations' in certbot_result.stdout or 'Successfully' in certbot_result.stdout"

- name: Afficher le résultat de Certbot
  debug:
    var: certbot_result.stdout_lines

- name: Créer le dossier de déploiement
  file:
    path: /opt/todo-app
    state: directory
    mode: '0755'

- name: Créer un .env minimal (requis par docker compose même si non utilisé par frontend)
  copy:
    dest: /opt/todo-app/.env
    content: |
      POSTGRES_USER=postgres
      POSTGRES_PASSWORD=placeholder
      POSTGRES_DB=todo_db
    mode: '0600'

- name: Copier le docker-compose.yml (source unique à la racine du projet)
  copy:
    src: "{{ playbook_dir }}/../../docker-compose.yml"
    dest: /opt/todo-app/docker-compose.yml
    mode: '0644'

- name: Puller l'image frontend
  command: docker compose pull frontend
  args:
    chdir: /opt/todo-app

- name: Démarrer le conteneur frontend
  command: docker compose up -d --no-deps frontend
  args:
    chdir: /opt/todo-app